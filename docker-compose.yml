services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: 'postgres'
    restart: always
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'postgres'
    volumes:
      - ${HOME}/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
